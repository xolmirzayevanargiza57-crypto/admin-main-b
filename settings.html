<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Main - Sozlamalar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/inputs.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <span>Admin Main</span>
                <span class="brand-version">v1.0</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link" data-nav-label="navDashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="admins.html" class="nav-link" data-nav-label="navAdmins"><i class="fas fa-users"></i> Admin Customerlar</a>
                <a href="admin-add.html" class="nav-link" data-nav-label="navAdd"><i class="fas fa-user-plus"></i> Yangi Admin</a>
                <a href="settings.html" class="nav-link active" data-nav-label="navSettings"><i class="fas fa-cog"></i> Sozlamalar</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2 data-i18n="settingsTitle">Sozlamalar</h2>
                        <p class="text-muted" data-i18n="settingsSubtitle">Tizim sozlamalarini boshqaring</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-small" id="themeToggleSmall"><i class="fas fa-moon"></i></button>
                        <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">
                            <span id="userInitial">A</span>
                        </div>
                    </div>
                </div>
            </header>

            <div id="notificationPanel" class="notification-panel"></div>

            <section class="settings-container">
                <!-- Profile -->
                <div class="settings-card">
                    <h3><i class="fas fa-user-shield"></i> Profil</h3>
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="settingsName"><i class="fas fa-user"></i> F.I.SH</label>
                            <div class="input-wrapper">
                                <input type="text" id="settingsName" placeholder="Ismingizni kiriting" />
                                <i class="fas fa-check-circle input-icon success"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="settingsEmail"><i class="fas fa-envelope"></i> Email</label>
                            <div class="input-wrapper">
                                <input type="email" id="settingsEmail" placeholder="Email kiriting" />
                                <i class="fas fa-check-circle input-icon success"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="settingsPhone"><i class="fas fa-phone"></i> Telefon</label>
                            <div class="input-wrapper">
                                <input type="text" id="settingsPhone" placeholder="+998 90 123 45 67" />
                                <i class="fas fa-check-circle input-icon success"></i>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Yangilash</button>
                    </form>
                </div>

                <!-- Password -->
                <div class="settings-card">
                    <h3><i class="fas fa-key"></i> Parol</h3>
                    <form id="passwordForm">
                        <div class="form-group">
                            <label for="oldPassword"><i class="fas fa-lock"></i> Eski parol</label>
                            <div class="input-wrapper">
                                <input type="password" id="oldPassword" placeholder="••••••••" />
                                <button type="button" class="password-toggle" data-target="oldPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="newPassword"><i class="fas fa-lock"></i> Yangi parol</label>
                            <div class="input-wrapper">
                                <input type="password" id="newPassword" placeholder="••••••••" minlength="6" />
                                <button type="button" class="password-toggle" data-target="newPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <span class="input-help"><i class="fas fa-info-circle"></i> Parol kamida 6 ta belgi</span>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword"><i class="fas fa-check"></i> Parolni tasdiqlang</label>
                            <div class="input-wrapper">
                                <input type="password" id="confirmPassword" placeholder="••••••••" />
                                <button type="button" class="password-toggle" data-target="confirmPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary"><i class="fas fa-key"></i> Parolni yangilash</button>
                    </form>
                    <div id="passwordMessage" class="form-message"></div>
                </div>

                <div class="settings-card">
                    <h3><i class="fas fa-language"></i> <span data-i18n="languageTitle">Til</span></h3>
                    <div class="theme-options">
                        <button class="theme-option" data-language-option="uz" id="langUz">
                            <i class="fas fa-language"></i>
                            <span>O‘zbek</span>
                        </button>
                        <button class="theme-option" data-language-option="en" id="langEn">
                            <i class="fas fa-globe"></i>
                            <span>English</span>
                        </button>
                    </div>
                    <p class="text-muted" style="margin-top: 12px; font-size: 0.8125rem;">
                        <i class="fas fa-info-circle"></i>
                        <span data-i18n="languageStatus">Hozirgi til</span>: <strong id="languageCurrent">O‘zbek</strong>
                    </p>
                </div>

                <!-- ============================================
                THEME SOZLAMALARI - TO'LIQ
                ============================================ -->
                <div class="settings-card">
                    <h3><i class="fas fa-palette"></i> <span data-i18n="themeTitle">Tashqi ko'rinish</span></h3>
                    <div class="theme-options">
                        <button class="theme-option active" data-theme="light" id="themeLight">
                            <i class="fas fa-sun"></i>
                            <span>Yorug'</span>
                        </button>
                        <button class="theme-option" data-theme="dark" id="themeDark">
                            <i class="fas fa-moon"></i>
                            <span>Qorong'u</span>
                        </button>
                        <button class="theme-option" data-theme="system" id="themeSystem">
                            <i class="fas fa-desktop"></i>
                            <span>Avtomatik</span>
                        </button>
                    </div>
                    <p class="text-muted" style="margin-top: 12px; font-size: 0.8125rem;">
                        <i class="fas fa-info-circle"></i> 
                        <span id="themeStatus">Hozirgi holat: Yorug'</span>
                    </p>
                </div>

                <!-- Danger Zone -->
                <div class="settings-card danger">
                    <h3><i class="fas fa-exclamation-triangle"></i> Xavfli zona</h3>
                    <p>Tizimdan chiqish yoki hisobni o'chirish</p>
                    <div class="settings-actions">
                        <button id="settingsLogout" class="btn-secondary"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
    </button>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/language.js"></script>
    <script src="js/app.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
