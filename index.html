<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Main - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/inputs.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="login-page">
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>

    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1 data-i18n="loginHeading">Admin Main</h1>
                <p class="text-muted" data-i18n="loginSubtitle">Tizimga kiring</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email" />
                        <!-- ✅ Success icon - o'ng tomonda -->
                        <i class="fas fa-check-circle input-icon success"></i>
                        <!-- ⚠️ Error icon - o'ng tomonda -->
                        <i class="fas fa-exclamation-circle input-icon error"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Parol
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
                        <!-- 👁️ Password toggle - eng o'ng tomonda -->
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary" data-i18n="loginButton">
                    <i class="fas fa-sign-in-alt"></i> Kirish
                </button>
            </form>

            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Email yoki parol noto'g'ri</span>
            </div>

            <div class="login-footer">
                <span data-i18n="loginFooter">© 2026 Admin Main</span>
                <span class="divider">•</span>
                <span>v1.0</span>
            </div>
        </div>
    </div>                                                                      

    <!-- JS - To'g'ri tartibda -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/language.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
