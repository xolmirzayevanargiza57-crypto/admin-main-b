<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Main - Admin Customerlar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/inputs.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <span>Admin Main</span>
                <span class="brand-version">v1.0</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link" data-nav-label="navDashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="admins.html" class="nav-link active" data-nav-label="navAdmins"><i class="fas fa-users"></i> Admin Customerlar</a>
                <a href="admin-add.html" class="nav-link" data-nav-label="navAdd"><i class="fas fa-user-plus"></i> Yangi Admin</a>
                <a href="settings.html" class="nav-link" data-nav-label="navSettings"><i class="fas fa-cog"></i> Sozlamalar</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header - FIKSLANGAN -->
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2 data-i18n="navAdmins">Admin Customerlar</h2>
                        <p class="text-muted">Barcha admin customerlarni boshqaring</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-small" id="themeToggleSmall"><i class="fas fa-moon"></i></button>
                    <a href="admin-add.html" class="btn-primary" style="width: auto; padding: 8px 18px; font-size: 0.8rem;">
                        <i class="fas fa-plus"></i> Yangi Admin
                    </a>
                </div>
            </header>

            <!-- Toolbar - FIKSLANGAN -->
            <section class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Admin qidirish..." />
                </div>
                <div class="filter-box">
                    <div class="filter-pills" id="subscriptionFilter">
                        <button type="button" class="filter-pill active" data-value="all">Barchasi</button>
                        <button type="button" class="filter-pill" data-value="active">Faol</button>
                        <button type="button" class="filter-pill" data-value="inactive">Faol emas</button>
                        <button type="button" class="filter-pill" data-value="none">Obunasi yo'q</button>
                    </div>
                    <button id="refreshBtn" class="btn-secondary" style="width: auto; padding: 8px 14px;">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </section>

            <!-- Table Container - SCROLL QILINADI -->
            <section class="table-container-scroll">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th><i class="fas fa-user"></i> F.I.SH</th>
                                <th><i class="fas fa-envelope"></i> Email</th>
                                <th><i class="fas fa-calendar"></i> Obuna</th>
                                <th><i class="fas fa-circle"></i> Holati</th>
                                <th><i class="fas fa-cog"></i> Harakatlar</th>
                            </tr>
                        </thead>
                        <tbody id="adminsTableBody">
                            <tr>
                                <td colspan="6" class="text-center">
                                    <div class="loading-spinner"></div>
                                    <p>Yuklanmoqda...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
    </button>

    <style>
        /* ============================================
           MAIN CONTENT - SCROLL QILISH UCHUN
           ============================================ */
        .main-content {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .top-header {
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
        }

        .toolbar {
            flex-shrink: 0;
            background: var(--bg-primary);
            padding: 12px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .toolbar .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .toolbar .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .toolbar .search-box input {
            width: 100%;
            padding: 8px 14px 8px 40px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }

        .toolbar .search-box input:focus {
            border-color: var(--border-focus);
            box-shadow: var(--shadow-focus);
        }

        .filter-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-pill {
            padding: 6px 14px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-pill:hover,
        .filter-pill.active {
            border-color: var(--border-focus);
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .filter-pill.active {
            background: var(--text-primary);
            color: var(--bg-primary);
        }

        [data-theme="dark"] .filter-pill.active {
            background: var(--text-primary);
            color: var(--bg-primary);
        }

        /* ============================================
           TABLE CONTAINER - SCROLL
           ============================================ */
        .table-container-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            padding: 16px 32px 32px 32px;
        }

        .table-container-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-container-scroll::-webkit-scrollbar-track {
            background: var(--bg-hover);
            border-radius: 10px;
        }

        .table-container-scroll::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .table-container-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .table-wrapper {
            width: 100%;
            min-width: 700px;
        }

        .data-table {
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--radius);
            border-collapse: collapse;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .data-table thead {
            background: var(--bg-hover);
        }

        .data-table thead th {
            position: sticky;
            top: 0;
            background: var(--bg-hover);
            z-index: 10;
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .data-table th i {
            margin-right: 4px;
        }

        .data-table td {
            padding: 12px 16px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .data-table tbody tr:hover {
            background: var(--bg-hover);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* ============================================
           BADGES
           ============================================ */
        .status-badge {
            display: inline-flex;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .status-badge.active {
            background: #e8f5e9;
            color: var(--color-success);
        }

        .status-badge.blocked {
            background: #fef2f2;
            color: var(--color-danger);
        }

        .status-badge.inactive {
            background: var(--bg-hover);
            color: var(--text-muted);
        }

        [data-theme="dark"] .status-badge.active {
            background: #1a3a2a;
            color: #4ac759;
        }

        [data-theme="dark"] .status-badge.blocked {
            background: #3a1a1a;
            color: #ff3b30;
        }

        [data-theme="dark"] .status-badge.inactive {
            background: var(--bg-hover);
            color: var(--text-muted);
        }

        .subscription-badge {
            display: inline-flex;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .subscription-badge.monthly {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .subscription-badge.yearly {
            background: var(--bg-active);
            color: var(--text-primary);
        }

        .subscription-badge.inactive {
            background: var(--bg-hover);
            color: var(--text-muted);
        }

        [data-theme="dark"] .subscription-badge.monthly {
            background: #1a3a2a;
            color: #4ac759;
        }

        [data-theme="dark"] .subscription-badge.yearly {
            background: #2a1a4a;
            color: #9a6aff;
        }

        /* ============================================
           ACTION BUTTONS
           ============================================ */
        .action-buttons {
            display: flex;
            flex-wrap: nowrap;
            gap: 4px;
            align-items: center;
        }

        .action-buttons .table-action {
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            text-decoration: none;
        }

        .action-buttons .table-action.view {
            background: var(--color-purple);
            color: #fff;
        }

        .action-buttons .table-action.view:hover {
            opacity: 0.85;
        }

        .action-buttons .table-action.ban {
            background: var(--color-danger);
            color: #fff;
        }

        .action-buttons .table-action.ban:hover {
            opacity: 0.85;
        }

        .action-buttons .table-action.delete {
            background: #dc2626;
            color: #fff;
        }

        .action-buttons .table-action.delete:hover {
            opacity: 0.85;
        }

        /* ============================================
           LOADING
           ============================================ */
        .loading-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-muted);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .top-header {
                padding: 12px 16px;
            }

            .top-header h2 {
                font-size: 0.95rem;
            }

            .toolbar {
                padding: 10px 16px;
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar .search-box {
                min-width: unset;
                width: 100%;
            }

            .filter-box {
                justify-content: stretch;
            }

            .filter-pills {
                flex-wrap: wrap;
            }

            .filter-pill {
                padding: 4px 10px;
                font-size: 0.7rem;
            }

            .table-container-scroll {
                padding: 12px 16px 16px 16px;
            }

            .table-wrapper {
                min-width: 600px;
            }

            .data-table th,
            .data-table td {
                padding: 8px 10px;
                font-size: 0.75rem;
            }

            .data-table th i {
                display: none;
            }

            .action-buttons .table-action {
                padding: 3px 6px;
                font-size: 0.6rem;
            }

            .action-buttons .table-action span {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .top-header {
                padding: 8px 12px;
            }

            .top-header h2 {
                font-size: 0.8rem;
            }

            .top-header .text-muted {
                font-size: 0.65rem;
            }

            .top-header .btn-primary {
                padding: 4px 10px;
                font-size: 0.65rem;
            }

            .top-header .btn-primary i {
                font-size: 0.6rem;
            }

            .toolbar {
                padding: 8px 12px;
            }

            .table-container-scroll {
                padding: 8px 12px 12px 12px;
            }

            .table-wrapper {
                min-width: 480px;
            }

            .data-table th,
            .data-table td {
                padding: 6px 8px;
                font-size: 0.65rem;
            }

            .action-buttons {
                gap: 2px;
            }

            .action-buttons .table-action {
                padding: 2px 5px;
                font-size: 0.5rem;
            }

            .status-badge,
            .subscription-badge {
                font-size: 0.6rem;
                padding: 2px 8px;
            }

            .filter-pill {
                padding: 3px 8px;
                font-size: 0.6rem;
            }
        }

        /* ============================================
           DARK THEME
           ============================================ */
        [data-theme="dark"] .data-table {
            background: var(--bg-card);
            border-color: var(--border-color);
        }

        [data-theme="dark"] .data-table thead {
            background: var(--bg-hover);
        }

        [data-theme="dark"] .data-table thead th {
            background: var(--bg-hover);
        }

        [data-theme="dark"] .data-table td {
            border-bottom-color: var(--border-color);
            color: var(--text-secondary);
        }

        [data-theme="dark"] .data-table tbody tr:hover {
            background: var(--bg-hover);
        }

        [data-theme="dark"] .toolbar {
            background: var(--bg-primary);
            border-bottom-color: var(--border-color);
        }

        [data-theme="dark"] .top-header {
            background: var(--bg-header);
            border-bottom-color: var(--border-color);
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/language.js"></script>
    <script src="js/app.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/admins.js"></script>
</body>
</html>
