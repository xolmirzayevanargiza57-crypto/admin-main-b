<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Main - Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/input.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <span>Admin Main</span>
                <span class="brand-version">v1.0</span>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link active">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="admins.html" class="nav-link">
                    <i class="fas fa-users"></i>
                    <span>Admin Customerlar</span>
                </a>
                <a href="admin-add.html" class="nav-link">
                    <i class="fas fa-user-plus"></i>
                    <span>Yangi Admin</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Sozlamalar</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Chiqish</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h2>Dashboard</h2>
                        <p class="text-muted">Barcha statistikalar bir joyda</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-small" id="themeToggleSmall">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">
                            <span id="userInitial">A</span>
                        </div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Admin</p>
                            <p class="user-role text-muted">Bosh Admin</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Jami Adminlar</p>
                        <p class="stat-value" id="totalCount">0</p>
                        <span class="stat-change positive" id="newThisWeek">
                            <i class="fas fa-arrow-up"></i> +0 bu hafta
                        </span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Oylik obuna</p>
                        <p class="stat-value" id="monthlyCount">0</p>
                        <span class="stat-change positive">
                            <i class="fas fa-circle" style="color: #34c759; font-size: 0.5rem;"></i> Faol
                        </span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple">
                        <i class="fas fa-calendar-plus"></i>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Yillik obuna</p>
                        <p class="stat-value" id="yearlyCount">0</p>
                        <span class="stat-change positive">
                            <i class="fas fa-circle" style="color: #7c3aed; font-size: 0.5rem;"></i> Faol
                        </span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <i class="fas fa-user-slash"></i>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Obunasi yo'q</p>
                        <p class="stat-value" id="inactiveCount">0</p>
                        <span class="stat-change negative">
                            <i class="fas fa-circle" style="color: #ff9500; font-size: 0.5rem;"></i> Faol emas
                        </span>
                    </div>
                </div>
            </section>

            <!-- Charts -->
            <section class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3><i class="fas fa-chart-doughnut"></i> Obuna statistikasi</h3>
                    </div>
                    <canvas id="subscriptionChart"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <h3><i class="fas fa-users"></i> Oxirgi adminlar</h3>
                    </div>
                    <div id="recentAdminsList" class="recent-admins">
                        <p class="text-muted">Yuklanmoqda...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
    </button>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
